<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>CasaFinanze</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1E2A3A">
  <!-- Applica il tema salvato prima del primo paint per evitare il flash di tema chiaro.
       ThemeService poi lo gestisce reattivamente. -->
  <script>
    (function () {
      try {
        var p = localStorage.getItem('casafinanze_theme') || 'system';
        var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      } catch (e) {}
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- iOS: installazione come app a schermo intero -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CasaFinanze">
</head>
<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
