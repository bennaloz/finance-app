@if (sw.updateReady()) {
  <div class="update-banner" role="alert">
    <span><i class="ti ti-rocket" aria-hidden="true"></i> Nuova versione disponibile</span>
    <button type="button" (click)="sw.applyUpdate()">Aggiorna</button>
  </div>
}
<router-outlet />

@if (showOverlay()) {
  <div class="loading-overlay" role="status" aria-live="polite">
    <div class="loading-card">
      <span class="spinner" aria-hidden="true"></span>
      <p class="loading-text">{{ slow() ? 'Avvio del server in corso…' : 'Caricamento…' }}</p>
      @if (slow()) {
        <p class="loading-sub">Al primo accesso può richiedere fino a un minuto.</p>
      }
    </div>
  </div>
}
