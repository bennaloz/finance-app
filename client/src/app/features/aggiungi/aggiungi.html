<div class="screen">
  <div class="tipo-toggle">
    <button class="tipo-btn" [class.active]="tipo() === 'singola'" (click)="setTipo('singola')"><i class="ti ti-receipt" aria-hidden="true"></i> Singola</button>
    <button class="tipo-btn" [class.active]="tipo() === 'ricorrente'" (click)="setTipo('ricorrente')"><i class="ti ti-repeat" aria-hidden="true"></i> Ricorrente</button>
    <button class="tipo-btn" [class.active]="tipo() === 'programmata'" (click)="setTipo('programmata')"><i class="ti ti-calendar-event" aria-hidden="true"></i> Programmata</button>
  </div>

  <div class="form-card">
    @if (error()) { <div class="login-error">{{ error() }}</div> }

    <div class="form-row">
      <label>Descrizione</label>
      <input type="text" [(ngModel)]="desc" placeholder="es. Assicurazione auto">
    </div>
    <div class="form-row">
      <label>Importo (€)</label>
      <input type="number" [(ngModel)]="amount" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="form-row">
      <label>Categoria</label>
      <select [(ngModel)]="cat">
        @for (o of catOptions(); track o.id) { <option [value]="o.id">{{ o.label }}</option> }
      </select>
    </div>
    <div class="form-row">
      <label>Chi paga</label>
      <select [(ngModel)]="payer">
        <option value="comune">Conto comune</option>
        <option value="riccardo">Riccardo</option>
        <option value="valentina">Valentina</option>
      </select>
    </div>

    @if (tipo() === 'singola') {
      <div class="form-row">
        <label>Data</label>
        <input type="date" [(ngModel)]="date">
      </div>
    }

    @if (tipo() === 'ricorrente') {
      <div class="form-row">
        <label>Frequenza</label>
        <select [(ngModel)]="freq">
          @for (f of freqList; track f.key) { <option [value]="f.key">{{ f.value }}</option> }
        </select>
      </div>
      <div class="form-row-2">
        <div class="form-row" style="margin-bottom:0">
          <label>Dal mese</label>
          <input type="month" [(ngModel)]="fromMonth">
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label>Fino a (opz.)</label>
          <input type="month" [(ngModel)]="toMonth">
        </div>
      </div>
      <div class="form-row" style="margin-top:.875rem;margin-bottom:0">
        <label>Giorno di addebito (opz.)</label>
        <input type="number" [(ngModel)]="chargeDay" placeholder="es. 15" min="1" max="31" step="1">
        <div class="hint">Giorno del mese in cui viene addebitata</div>
      </div>
    }

    @if (tipo() === 'programmata') {
      <div class="form-row">
        <label>Mese previsto</label>
        <input type="month" [(ngModel)]="progMonth">
        <div class="hint">Apparirà automaticamente nel mese indicato</div>
      </div>
    }

    <button class="btn-primary" (click)="save()">{{ saveLabel() }}</button>
    <button class="btn-secondary" style="margin-top:.5rem" (click)="cancel()">Annulla</button>
  </div>
</div>
