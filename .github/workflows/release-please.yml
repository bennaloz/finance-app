name: release-please

# Gestisce il versionamento SemVer di CasaFinanze a partire dai Conventional Commits.
# Gira solo su main (branch di release): accumula i commit conventional dall'ultimo tag,
# apre/aggiorna una "Release PR" che bumpa la versione e il CHANGELOG; al merge di quella
# PR crea il tag vX.Y.Z e la GitHub Release. Versione condivisa tra client e backend
# (vedi release-please-config.json + .release-please-manifest.json).
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
