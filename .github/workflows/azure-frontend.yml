name: Deploy frontend (Static Web Apps)

# Compila il client Angular (con l'URL del backend iniettato) e lo pubblica sulla
# Static Web App esistente. Riusa il deployment token già creato da Azure.
on:
  push:
    branches: [refactor/dotnet-angular]
    paths:
      - 'client/**'
      - '.github/workflows/azure-frontend.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Inietta apiBaseUrl di produzione
        working-directory: client
        run: |
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            apiBaseUrl: '${{ vars.API_BASE_URL || 'https://bennaloz-home-finances.azurewebsites.net' }}',
          };
          EOF

      - name: Install & build
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Get OIDC token
        uses: actions/github-script@v7
        id: idtoken
        with:
          script: return await core.getIDToken()
          result-encoding: string

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_PEBBLE_0703CEE03 }}
          github_id_token: ${{ steps.idtoken.outputs.result }}
          action: upload
          app_location: 'client/dist/client/browser'
          api_location: ''
          output_location: ''
          skip_app_build: true
          skip_api_build: true
