name: Azure Static Web Apps CI/CD

# Builda Angular e pubblica sulla Static Web App col solo deployment token
# (le SWA non sono collegate a GitHub, provider None):
#   develop -> bennaloz-home-finances-test (happy-river), API di test
#   main    -> bennaloz-home-finances      (red-ocean),   API di produzione
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
    env:
      IS_PROD: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Inietta apiBaseUrl (backend dell'ambiente)
        working-directory: client
        run: |
          if [ "$IS_PROD" = "true" ]; then
            API_URL='${{ vars.API_BASE_URL || 'https://bennaloz-home-finances.azurewebsites.net' }}'
          else
            API_URL='${{ vars.API_BASE_URL_TEST || 'https://bennaloz-home-finances-test.azurewebsites.net' }}'
          fi
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            apiBaseUrl: '$API_URL',
          };
          EOF

      - name: Install & build Angular
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ github.ref == 'refs/heads/main' && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
          action: "upload"
          app_location: "client/dist/client/browser"
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true
