name: Deploy backend (App Service)

# Pubblica l'API .NET 10 su Azure App Service "bennaloz-home-finances" via OIDC.
# Riusa le federated credentials create da Azure (Deployment Center).
on:
  push:
    branches: [refactor/dotnet-angular]
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend.yml'
  workflow_dispatch:

env:
  PROJECT: backend/CasaFinanze.Api/CasaFinanze.Api.csproj
  APP_NAME: bennaloz-home-finances

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish ${{ env.PROJECT }} -c Release -o ${{ github.workspace }}/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # richiesto per l'OIDC verso Azure
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: publish

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DCE8A8DFFAD046C1840A625F088E22AD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_62F2C8245A7F4ADD8391A44306450119 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_81F00A4A2C954AD19762BCC9673E846A }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: 'Production'
          package: publish
